name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://reels:reels@localhost:5432/reels_factory
      SKIP_PAYMENT: "true"
      NEXTAUTH_SECRET: ci-secret-for-build
      NEXT_PUBLIC_APP_URL: https://example.vercel.app

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reels
          POSTGRES_PASSWORD: reels
          POSTGRES_DB: reels_factory
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push database schema
        run: npm run db:push

      - name: Build web app
        run: npm run build --workspace=@reels-factory/web
